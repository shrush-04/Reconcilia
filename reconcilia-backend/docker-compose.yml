version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reconcilia-postgres
    environment:
      POSTGRES_DB: reconcilia
      POSTGRES_USER: reconcilia
      POSTGRES_PASSWORD: reconcilia
    ports:
      - "5432:5432"
    volumes:
      - reconcilia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconcilia -d reconcilia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reconcilia_pgdata:
    driver: local
